<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ordem de Servico - Verde Interior</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap');

  :root {
    --green-dark: #1a3328;
    --green-mid: #2d5a47;
    --green-accent: #3d7a5e;
    --green-light: #e8f2ee;
    --red: #c0392b;
    --sand: #f5f0e8;
    --white: #ffffff;
    --gray-50: #fafaf9;
    --gray-100: #f7f7f5;
    --gray-200: #ebebea;
    --gray-300: #d5d5d3;
    --gray-400: #a0a09e;
    --gray-600: #5a5a58;
    --gray-900: #1c1c1a;
    --border: #dcdcda;
    --status-ok: #2d7a4f;
    --status-pending: #c07a00;
    --status-locked: #a0a09e;
    --amber-bg: #fff8e6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { overscroll-behavior: none; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--gray-100);
    color: var(--gray-900);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .doc-header {
    background: var(--green-dark);
    color: var(--white);
    padding: 18px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .header-top {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--red);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    flex-shrink: 0;
  }
  .brand-text { display: flex; flex-direction: column; gap: 1px; }
  .brand-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; font-weight: 800;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .brand-sub { font-size: 9px; color: #8aab9a; letter-spacing: 0.08em; text-transform: uppercase; }

  .mode-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 10px; border-radius: 4px;
  }
  .mode-badge.execucao { background: var(--status-pending); color: #fff; }
  .mode-badge.conclusao { background: var(--status-ok); color: #fff; }

  .header-info {
    display: flex; flex-direction: column; gap: 4px;
  }
  .os-number {
    font-family: 'Montserrat', sans-serif;
    font-size: 17px; font-weight: 700;
    letter-spacing: 0.02em;
  }
  .os-client { font-size: 13px; color: #aac9b8; font-weight: 500; }
  .os-address { font-size: 11px; color: #8aab9a; }

  .header-actions {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .header-btn {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 0.15s;
  }
  .header-btn:hover, .header-btn:active { background: rgba(255,255,255,0.22); }

  /* ── MAIN ── */
  .doc-body { max-width: 780px; margin: 0 auto; padding: 16px 14px 96px; }

  /* ── MODE BANNER ── */
  .mode-banner {
    background: var(--amber-bg);
    border: 1px solid #f0d78a;
    border-left: 4px solid var(--status-pending);
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 12px; color: var(--gray-600);
    margin-bottom: 18px;
    line-height: 1.55;
  }
  .mode-banner.conclusao {
    background: var(--green-light);
    border-color: #b8d4c8;
    border-left-color: var(--status-ok);
  }
  .mode-banner strong { color: var(--gray-900); }

  /* ── PLANT CARD ── */
  .plant-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .plant-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .plant-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--green-dark);
    letter-spacing: 0.01em;
  }
  .plant-local {
    font-size: 11px; color: var(--gray-600);
    margin-top: 2px;
  }
  .plant-obs {
    font-size: 12px;
    background: var(--gray-100);
    border-left: 3px solid var(--green-accent);
    padding: 8px 10px;
    border-radius: 0 4px 4px 0;
    color: var(--gray-600);
  }
  .plant-status {
    font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 4px 8px; border-radius: 4px;
    flex-shrink: 0;
  }
  .plant-status.pending { background: var(--gray-200); color: var(--gray-600); }
  .plant-status.antes-ok { background: #fff3cd; color: var(--status-pending); }
  .plant-status.done { background: #d4edda; color: var(--status-ok); }

  /* ── PHOTO SLOTS ── */
  .photo-slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-slot {
    border: 2px dashed var(--border);
    border-radius: 8px;
    aspect-ratio: 4/3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    background: var(--gray-50);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .photo-slot:active { background: var(--gray-200); }
  .photo-slot.filled { border-style: solid; padding: 0; cursor: default; }
  .photo-slot.filled.antes { border-color: var(--status-pending); }
  .photo-slot.filled.depois { border-color: var(--status-ok); }
  .photo-slot.locked {
    background: var(--gray-100);
    border-color: var(--gray-200);
    cursor: not-allowed;
    opacity: 0.7;
  }
  .photo-slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .slot-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--gray-400);
  }
  .slot-label.antes { color: var(--status-pending); }
  .slot-label.depois { color: var(--status-ok); }
  .slot-icon { font-size: 22px; color: var(--gray-400); }
  .slot-hint { font-size: 10px; color: var(--gray-400); text-align: center; padding: 0 8px; }

  .slot-tag {
    position: absolute;
    top: 6px; left: 6px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 3px;
    background: rgba(0,0,0,0.65); color: #fff;
    pointer-events: none;
  }
  .slot-remove {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(0,0,0,0.65); color: #fff;
    border: none; border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .slot-replace {
    position: absolute;
    bottom: 6px; right: 6px;
    background: rgba(255,255,255,0.9); color: var(--gray-900);
    border: none; border-radius: 4px;
    padding: 4px 8px;
    font-size: 10px; font-weight: 600;
    cursor: pointer;
  }

  .obs-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    color: var(--gray-900);
    background: var(--white);
    resize: vertical;
    min-height: 44px;
    outline: none;
  }
  .obs-input:focus { border-color: var(--green-accent); }
  .obs-input::placeholder { color: var(--gray-400); }

  .obs-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gray-600);
    display: block;
    margin-bottom: 4px;
  }

  /* ── FLOATING ACTION ── */
  .fab-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 14px;
    background: linear-gradient(to top, var(--gray-100) 65%, rgba(247,247,245,0));
    z-index: 100;
    pointer-events: none;
  }
  .fab-btn {
    pointer-events: auto;
    display: block;
    width: 100%;
    max-width: 780px;
    margin: 0 auto;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(26,51,40,0.25);
    transition: background 0.15s, transform 0.1s;
  }
  .fab-btn:hover { background: var(--green-accent); }
  .fab-btn:active { transform: translateY(1px); }
  .fab-btn:disabled {
    background: var(--gray-300);
    color: var(--gray-600);
    cursor: not-allowed;
    box-shadow: none;
  }

  .fab-btn.success { background: var(--status-ok); }
  .fab-btn.success:hover { background: #235c3a; }

  /* ── EMPTY STATE ── */
  .empty-screen {
    max-width: 480px;
    margin: 40px auto;
    padding: 32px 24px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: center;
    display: flex; flex-direction: column; gap: 14px;
  }
  .empty-screen h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    color: var(--green-dark);
  }
  .empty-screen p { font-size: 13px; color: var(--gray-600); }
  .empty-screen input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit; font-size: 12px;
    color: var(--gray-900);
    outline: none;
  }
  .empty-screen input:focus { border-color: var(--green-accent); }
  .empty-screen button {
    background: var(--green-dark);
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .empty-screen .example {
    font-size: 11px; color: var(--gray-400);
    background: var(--gray-100);
    padding: 10px; border-radius: 4px;
    word-break: break-all;
    text-align: left;
    font-family: 'Courier New', monospace;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 12px;
    padding: 24px 20px;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--green-dark);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .modal .qr-holder {
    padding: 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .modal .qr-url {
    font-size: 11px;
    color: var(--gray-600);
    word-break: break-all;
    text-align: center;
    background: var(--gray-100);
    padding: 8px;
    border-radius: 4px;
    width: 100%;
    font-family: 'Courier New', monospace;
  }
  .modal-btn {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    font-family: inherit; font-size: 12px; font-weight: 600;
    cursor: pointer;
    background: var(--gray-200); color: var(--gray-600);
  }
  .modal-btn.primary { background: var(--green-dark); color: #fff; }

  /* ── SUMMARY ── */
  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .summary-card h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px; color: var(--status-ok);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .summary-card p { font-size: 13px; color: var(--gray-600); }

  /* ── ALERT ── */
  .alert-missing {
    background: #fde2e2;
    border-left: 4px solid var(--red);
    color: #7a1f1f;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 12px;
    display: none;
  }
  .alert-missing.show { display: block; }
  .alert-missing strong { display: block; margin-bottom: 4px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--green-dark);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 12px; font-weight: 600;
    z-index: 2000;
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Desktop */
  @media (min-width: 720px) {
    body { font-size: 14px; }
    .doc-header { padding: 24px 32px; }
    .doc-body { padding: 24px 24px 110px; }
    .plant-card { padding: 18px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- Input file oculto reutilizado -->
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">

<!-- Modal QR -->
<div class="modal-overlay" id="qrModal">
  <div class="modal">
    <h2>QR desta OS</h2>
    <div class="qr-holder" id="qrHolder"></div>
    <div class="qr-url" id="qrUrl"></div>
    <button class="modal-btn primary" onclick="fecharQR()">Fechar</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   Ordem de Servico - Verde Interior
   Modo Execucao (Antes) e Modo Conclusao (Depois)
   Decisao 22/jun: Opcao B - Antes obrigatorio antes de intervir
   ================================================================ */

/* ---------- 1. Query string -> estado inicial ---------- */
function lerParametros() {
  const p = new URLSearchParams(window.location.search);
  return {
    cliente: p.get('cliente') || '',
    os: p.get('os') || '',
    endereco: p.get('endereco') || '',
    bairro: p.get('bairro') || '',
    contato: p.get('contato') || '',
    telefone: p.get('telefone') || '',
    modo: (p.get('modo') === 'conclusao') ? 'conclusao' : 'execucao',
    plantasRaw: p.get('plantas') || ''
  };
}

/* Formato compacto "Nome:Local:Obs|Nome:Local:Obs"
   ou JSON URL-encoded [{id,nome,local,obs}] */
function parsePlantas(raw) {
  if (!raw) return [];
  const trim = raw.trim();
  // Tentativa JSON
  if (trim.startsWith('[') || trim.startsWith('%5B')) {
    try {
      const arr = JSON.parse(decodeURIComponent(trim));
      return arr.map((p, i) => ({
        id: p.id || 'p' + (i + 1),
        nome: p.nome || 'Planta ' + (i + 1),
        local: p.local || '',
        obs: p.obs || ''
      }));
    } catch (e) { /* cai no compacto */ }
  }
  // Compacto: Nome:Local:Obs | Nome:Local:Obs
  return trim.split('|').filter(Boolean).map((chunk, i) => {
    const parts = chunk.split(':');
    return {
      id: 'p' + (i + 1),
      nome: (parts[0] || 'Planta ' + (i + 1)).trim(),
      local: (parts[1] || '').trim(),
      obs: (parts[2] || '').trim()
    };
  });
}

/* ---------- 2. Persistencia local ---------- */
function chaveStorage(osId) { return 'verde-os-' + osId; }

function carregarEstado(osId, plantasBase, modo) {
  const chave = chaveStorage(osId);
  let salvo = {};
  try { salvo = JSON.parse(localStorage.getItem(chave) || '{}'); } catch (e) {}

  const plantasSalvas = salvo.plantas || [];
  // Mescla: base tem dados vindos da URL; salvo tem fotos + observacoes
  const plantas = plantasBase.map(base => {
    const s = plantasSalvas.find(x => x.id === base.id) || {};
    return {
      ...base,
      antesUrl: s.antesUrl || null,
      depoisUrl: s.depoisUrl || null,
      obsAntes: s.obsAntes || '',
      obsDepois: s.obsDepois || ''
    };
  });

  return { modo: modo, plantas: plantas };
}

function salvarEstado(osId, estado) {
  try {
    localStorage.setItem(chaveStorage(osId), JSON.stringify({
      modo: estado.modo,
      plantas: estado.plantas.map(p => ({
        id: p.id,
        antesUrl: p.antesUrl,
        depoisUrl: p.depoisUrl,
        obsAntes: p.obsAntes,
        obsDepois: p.obsDepois
      })),
      updatedAt: Date.now()
    }));
  } catch (e) {
    console.warn('localStorage cheio', e);
  }
}

/* ---------- 3. Compactacao WebP (~100KB, mesmo padrao App Ponto) ---------- */
function compactarImagem(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Redimensiona max 1600px lado maior
        const maxLado = 1600;
        let w = img.width, h = img.height;
        if (w > h && w > maxLado) { h = h * (maxLado / w); w = maxLado; }
        else if (h > maxLado) { w = w * (maxLado / h); h = maxLado; }

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // Tenta WebP; ajusta qualidade ate <100KB
        let quality = 0.85;
        let dataUrl = canvas.toDataURL('image/webp', quality);
        while (dataUrl.length > 140000 && quality > 0.3) {
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/webp', quality);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- 4. Estado global ---------- */
let CFG = null;
let ESTADO = null;

/* ---------- 5. Render ---------- */
function render() {
  const app = document.getElementById('app');

  // Tela vazia
  if (!CFG.os || !CFG.cliente || CFG.plantasBase.length === 0) {
    app.innerHTML = renderVazio();
    return;
  }

  const modo = ESTADO.modo;
  const todasAntes = ESTADO.plantas.every(p => p.antesUrl);
  const todasDepois = ESTADO.plantas.every(p => p.depoisUrl);

  app.innerHTML = `
    <div class="doc-header">
      <div class="header-top">
        <div class="header-brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-name">Verde Interior</div>
            <div class="brand-sub">Ordem de Servico</div>
          </div>
        </div>
        <span class="mode-badge ${modo}">${modo === 'execucao' ? 'Execucao' : 'Conclusao'}</span>
      </div>
      <div class="header-info">
        <div class="os-number">${escapeHtml(CFG.os)}</div>
        <div class="os-client">${escapeHtml(CFG.cliente)}</div>
        ${(CFG.endereco || CFG.bairro) ? `<div class="os-address">${escapeHtml([CFG.endereco, CFG.bairro].filter(Boolean).join(' - '))}</div>` : ''}
        ${(CFG.contato || CFG.telefone) ? `<div class="os-address">${escapeHtml([CFG.contato, CFG.telefone].filter(Boolean).join(' - '))}</div>` : ''}
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="copiarLink()">Copiar link</button>
        <button class="header-btn" onclick="abrirQR()">QR</button>
        ${modo === 'conclusao' ? '<button class="header-btn" onclick="voltarExecucao()">Voltar p/ Execucao</button>' : ''}
      </div>
    </div>

    <div class="doc-body">
      <div class="mode-banner ${modo}">
        ${modo === 'execucao'
          ? '<strong>Modo Execucao.</strong> Registre a foto <strong>Antes</strong> de cada planta antes de iniciar qualquer intervencao. Ao terminar todas, avance para o Modo Conclusao.'
          : '<strong>Modo Conclusao.</strong> Fotos "Antes" travadas. Registre as fotos <strong>Depois</strong> de cada planta e conclua a OS.'
        }
      </div>

      <div class="alert-missing" id="alertMissing"></div>

      ${ESTADO.plantas.map((p, idx) => renderPlanta(p, idx, modo)).join('')}
    </div>

    <div class="fab-wrap">
      ${renderFab(modo, todasAntes, todasDepois)}
    </div>
  `;

  // Bind observacoes
  ESTADO.plantas.forEach((p, idx) => {
    const antesEl = document.getElementById('obs-antes-' + idx);
    if (antesEl) {
      antesEl.addEventListener('input', () => {
        ESTADO.plantas[idx].obsAntes = antesEl.value;
        salvarEstado(CFG.os, ESTADO);
      });
    }
    const depoisEl = document.getElementById('obs-depois-' + idx);
    if (depoisEl) {
      depoisEl.addEventListener('input', () => {
        ESTADO.plantas[idx].obsDepois = depoisEl.value;
        salvarEstado(CFG.os, ESTADO);
      });
    }
  });
}

function renderPlanta(p, idx, modo) {
  let statusHtml;
  if (p.antesUrl && p.depoisUrl) {
    statusHtml = '<span class="plant-status done">Concluida</span>';
  } else if (p.antesUrl) {
    statusHtml = '<span class="plant-status antes-ok">Antes ok</span>';
  } else {
    statusHtml = '<span class="plant-status pending">Pendente</span>';
  }

  return `
    <div class="plant-card" data-idx="${idx}">
      <div class="plant-head">
        <div>
          <div class="plant-title">${escapeHtml(p.nome)}</div>
          ${p.local ? `<div class="plant-local">${escapeHtml(p.local)}</div>` : ''}
        </div>
        ${statusHtml}
      </div>

      ${p.obs ? `<div class="plant-obs">${escapeHtml(p.obs)}</div>` : ''}

      <div class="photo-slots">
        ${renderSlot(p, idx, 'antes', modo)}
        ${renderSlot(p, idx, 'depois', modo)}
      </div>

      ${p.antesUrl ? `
        <div>
          <label class="obs-label">Observacao (Antes)</label>
          <textarea class="obs-input" id="obs-antes-${idx}" placeholder="Ex: raiz aparente, folhas amareladas...">${escapeHtml(p.obsAntes)}</textarea>
        </div>
      ` : ''}

      ${(modo === 'conclusao' && p.depoisUrl) ? `
        <div>
          <label class="obs-label">Observacao (Depois)</label>
          <textarea class="obs-input" id="obs-depois-${idx}" placeholder="Ex: podas realizadas, adubacao aplicada...">${escapeHtml(p.obsDepois)}</textarea>
        </div>
      ` : ''}
    </div>
  `;
}

function renderSlot(p, idx, tipo, modo) {
  const url = tipo === 'antes' ? p.antesUrl : p.depoisUrl;
  const labelTxt = tipo === 'antes' ? 'Antes' : 'Depois';

  // Regras de trava
  const bloqueado = (tipo === 'depois' && modo === 'execucao');
  const bloqueadoDepoisSemAntes = (tipo === 'depois' && !p.antesUrl);
  const bloqueadoAntesEmConclusao = (tipo === 'antes' && modo === 'conclusao' && p.antesUrl);

  if (url) {
    return `
      <div class="photo-slot filled ${tipo}">
        <img src="${url}" alt="${labelTxt}">
        <span class="slot-tag">${labelTxt}</span>
        ${!bloqueadoAntesEmConclusao ? `<button class="slot-remove" onclick="removerFoto(${idx}, '${tipo}')">x</button>` : ''}
        ${!bloqueadoAntesEmConclusao ? `<button class="slot-replace" onclick="pedirFoto(${idx}, '${tipo}')">Trocar</button>` : ''}
      </div>
    `;
  }

  if (bloqueado || bloqueadoDepoisSemAntes) {
    return `
      <div class="photo-slot locked">
        <div class="slot-icon">🔒</div>
        <div class="slot-label">${labelTxt}</div>
        <div class="slot-hint">${bloqueado ? 'Libera no Modo Conclusao' : 'Registre "Antes" primeiro'}</div>
      </div>
    `;
  }

  return `
    <div class="photo-slot" onclick="pedirFoto(${idx}, '${tipo}')">
      <div class="slot-icon">+</div>
      <div class="slot-label ${tipo}">${labelTxt}</div>
      <div class="slot-hint">Toque para adicionar</div>
    </div>
  `;
}

function renderFab(modo, todasAntes, todasDepois) {
  if (modo === 'execucao') {
    return `
      <button class="fab-btn" ${todasAntes ? '' : 'disabled'} onclick="avancarParaConclusao()">
        ${todasAntes ? 'Finalizar Execucao - Ir para Conclusao' : 'Registre todas as fotos "Antes" para avancar'}
      </button>
    `;
  }
  return `
    <button class="fab-btn success" ${todasDepois ? '' : 'disabled'} onclick="concluirOS()">
      ${todasDepois ? 'Concluir OS' : 'Registre todas as fotos "Depois" para concluir'}
    </button>
  `;
}

function renderVazio() {
  return `
    <div class="empty-screen">
      <h1>Ordem de Servico</h1>
      <p>Cole abaixo o link completo da OS (com parametros) ou abra pelo QR compartilhado.</p>
      <input type="text" id="urlInput" placeholder="https://.../os.html?cliente=...&os=...">
      <button onclick="irParaLink()">Abrir OS</button>
      <div class="example">
        Exemplo:<br>
        ?cliente=Heimr&os=OS-2026-042&modo=execucao&plantas=Ficus:Sala:podar|Zamioculca:Recepcao:limpar
      </div>
    </div>
  `;
}

/* ---------- 6. Acoes ---------- */
let ALVO = null; // { idx, tipo }

function pedirFoto(idx, tipo) {
  ALVO = { idx, tipo };
  const input = document.getElementById('photoInput');
  input.value = '';
  input.click();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('photoInput').addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file || !ALVO) return;
    toast('Comprimindo foto...');
    try {
      const dataUrl = await compactarImagem(file);
      const { idx, tipo } = ALVO;
      if (tipo === 'antes') ESTADO.plantas[idx].antesUrl = dataUrl;
      else ESTADO.plantas[idx].depoisUrl = dataUrl;
      salvarEstado(CFG.os, ESTADO);
      esconderAlerta();
      render();
    } catch (err) {
      alert('Falha ao processar imagem: ' + err.message);
    }
    ALVO = null;
  });

  iniciar();
});

function removerFoto(idx, tipo) {
  if (!confirm('Remover esta foto?')) return;
  if (tipo === 'antes') {
    ESTADO.plantas[idx].antesUrl = null;
    ESTADO.plantas[idx].obsAntes = '';
    // Se remover Antes, Depois tambem some (regra Opcao B)
    ESTADO.plantas[idx].depoisUrl = null;
    ESTADO.plantas[idx].obsDepois = '';
  } else {
    ESTADO.plantas[idx].depoisUrl = null;
    ESTADO.plantas[idx].obsDepois = '';
  }
  salvarEstado(CFG.os, ESTADO);
  render();
}

function avancarParaConclusao() {
  const faltando = ESTADO.plantas.filter(p => !p.antesUrl).map(p => p.nome);
  if (faltando.length) {
    mostrarAlerta('Faltam fotos "Antes"', faltando);
    return;
  }
  const params = new URLSearchParams(window.location.search);
  params.set('modo', 'conclusao');
  window.location.search = params.toString();
}

function voltarExecucao() {
  if (!confirm('Voltar para o Modo Execucao? Fotos "Depois" continuam salvas.')) return;
  const params = new URLSearchParams(window.location.search);
  params.set('modo', 'execucao');
  window.location.search = params.toString();
}

function concluirOS() {
  const faltando = ESTADO.plantas.filter(p => !p.depoisUrl).map(p => p.nome);
  if (faltando.length) {
    mostrarAlerta('Faltam fotos "Depois"', faltando);
    return;
  }
  mostrarResumo();
}

function mostrarAlerta(titulo, nomes) {
  const el = document.getElementById('alertMissing');
  if (!el) return;
  el.classList.add('show');
  el.innerHTML = `<strong>${titulo}</strong> ${nomes.map(escapeHtml).join(', ')}`;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function esconderAlerta() {
  const el = document.getElementById('alertMissing');
  if (el) el.classList.remove('show');
}

function mostrarResumo() {
  const app = document.getElementById('app');
  const total = ESTADO.plantas.length;
  const linhas = ESTADO.plantas.map(p => `
    <div class="plant-card">
      <div class="plant-head">
        <div>
          <div class="plant-title">${escapeHtml(p.nome)}</div>
          ${p.local ? `<div class="plant-local">${escapeHtml(p.local)}</div>` : ''}
        </div>
        <span class="plant-status done">Concluida</span>
      </div>
      <div class="photo-slots">
        <div class="photo-slot filled antes"><img src="${p.antesUrl}"><span class="slot-tag">Antes</span></div>
        <div class="photo-slot filled depois"><img src="${p.depoisUrl}"><span class="slot-tag">Depois</span></div>
      </div>
      ${p.obsAntes ? `<div class="plant-obs"><strong>Antes:</strong> ${escapeHtml(p.obsAntes)}</div>` : ''}
      ${p.obsDepois ? `<div class="plant-obs"><strong>Depois:</strong> ${escapeHtml(p.obsDepois)}</div>` : ''}
    </div>
  `).join('');

  app.innerHTML = `
    <div class="doc-header">
      <div class="header-top">
        <div class="header-brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-name">Verde Interior</div>
            <div class="brand-sub">OS Concluida</div>
          </div>
        </div>
        <span class="mode-badge conclusao">Finalizada</span>
      </div>
      <div class="header-info">
        <div class="os-number">${escapeHtml(CFG.os)}</div>
        <div class="os-client">${escapeHtml(CFG.cliente)}</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="window.print()">Imprimir</button>
        <button class="header-btn" onclick="exportarJSON()">Exportar JSON</button>
        <button class="header-btn" onclick="voltarExecucao()">Reabrir</button>
      </div>
    </div>
    <div class="doc-body">
      <div class="summary-card">
        <h3>OS Concluida</h3>
        <p>${total} planta(s) atendida(s). Voce ja pode compartilhar o registro fotografico ou exportar em JSON para arquivar no CRM.</p>
      </div>
      ${linhas}
    </div>
  `;
}

function exportarJSON() {
  const payload = {
    os: CFG.os,
    cliente: CFG.cliente,
    endereco: CFG.endereco,
    bairro: CFG.bairro,
    contato: CFG.contato,
    telefone: CFG.telefone,
    concluidaEm: new Date().toISOString(),
    plantas: ESTADO.plantas
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'os-' + CFG.os + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ---------- 7. Link e QR ---------- */
function copiarLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => toast('Link copiado!'))
    .catch(() => {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = url; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); ta.remove();
      toast('Link copiado!');
    });
}

function abrirQR() {
  const url = window.location.href;
  const modal = document.getElementById('qrModal');
  const holder = document.getElementById('qrHolder');
  const urlEl = document.getElementById('qrUrl');
  urlEl.textContent = url;
  // Usa API pubica como fallback simples (sem dependencia extra).
  // Suficiente para uso interno da equipe de campo.
  holder.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&margin=6&data=${encodeURIComponent(url)}" alt="QR" width="260" height="260">`;
  modal.classList.add('open');
}
function fecharQR() {
  document.getElementById('qrModal').classList.remove('open');
}

function irParaLink() {
  const v = document.getElementById('urlInput').value.trim();
  if (!v) return;
  try {
    const u = new URL(v);
    window.location.href = u.pathname + u.search;
  } catch (e) {
    // Assume so query string
    if (v.startsWith('?')) window.location.search = v;
    else window.location.search = '?' + v;
  }
}

/* ---------- 8. Toast ---------- */
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ---------- 9. Utils ---------- */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- 10. Boot ---------- */
function iniciar() {
  const params = lerParametros();
  const plantasBase = parsePlantas(params.plantasRaw);
  CFG = { ...params, plantasBase };
  ESTADO = carregarEstado(CFG.os, plantasBase, params.modo);
  // Se modo salvo divergir do param (nao acontece hoje, mas por seguranca):
  ESTADO.modo = params.modo;
  render();
}
</script>
